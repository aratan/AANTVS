<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administración — Subir ficheros</title>
  <link rel="stylesheet" href="./upload.css">
</head>
<body>
  <div class="admin">
    <h1>Subir fichero</h1>

    <div id="dropzone" class="dropzone">
      <input type="file" id="fileInput" hidden accept=".mp4,.webm,.ogg,.jpg,.jpeg,.png,.gif,.webp,.pdf,.txt,.csv,.json,.torrent,.zip,.mp3,.wav">
      <p>Arrastra un fichero aquí o <span class="browse-link" id="browseBtn">haz clic para buscar</span></p>
      <small class="hint máx. 50&nbsp;MB — formatos: mp4, webm, ogg, jpg, png, gif, pdf, txt, json, csv, torrent</small>
    </div>

    <div id="preview" class="preview hidden">
      <img id="preview-img" class="hidden" alt="">
      <video id="preview-vid" class="hidden" controls></video>
      <p id="fileInfo" class="info"></p>
      <button id="uploadBtn" class="btn btn--primary">Subir</button>
    </div>

    <div id="status" class="status hidden"></div>
  </div>

  <script src="./upload.js"></script>
</body>
</html>
