# OpenSpec Configuration for AANTVS

## Project Context

- **Name**: AANTVS (AANTV-Stream)
- **Stack**: Go 1.21+ (stdlib only, zero external dependencies)
- **Architecture**: Single-binary HTTP server with template rendering; file upload endpoint serving static files from `api/` directory
- **Purpose**: Movie/series streaming server consuming remote data (Pastebin API) and serving via HTTP with HLS support

